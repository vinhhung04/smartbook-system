version: '3.8'

services:
  # 1. Cơ sở dữ liệu PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: smartbook_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: inventory_db  # Tạo sẵn DB cho Inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # 2. Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smartbook_redis
    ports:
      - "6379:6379"
    restart: always

  # 3. RabbitMQ (Message Queue)
  rabbitmq:
    image: rabbitmq:3-management-alpine # Bản có giao diện quản lý web
    container_name: smartbook_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # Port để code Backend kết nối
      - "15672:15672" # Port để xem giao diện quản trị trên trình duyệt
    restart: always

  # 4. pgAdmin (Công cụ xem DB PostgreSQL trực quan trên web)
  pgadmin:
    image: dpage/pgadmin4
    container_name: smartbook_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smartbook.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: always

volumes:
  postgres_data:
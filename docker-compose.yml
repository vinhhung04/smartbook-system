services:
  # 1. Cơ sở dữ liệu
  db:
    image: postgres:15-alpine
    container_name: smartbook_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro

  # 2. Quản lý DB (Giao diện web)
  pgadmin:
    image: dpage/pgadmin4
    container_name: smartbook_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - db

  # 3. Backend (Inventory Service)
  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    command: sh -c "npm run start"
    ports:
      - "3003:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${INVENTORY_DB_NAME}?schema=public
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - db

  # 4. Authentication Service
  auth-service:
    build: ./auth-service
    container_name: auth-service
    command: sh -c "npm run start"
    ports:
      - "3004:3002"
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${AUTH_DB_NAME}?schema=public
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - db

  # Dev profile jobs: only run when --profile dev is enabled.
  # These jobs apply Prisma schema changes for local development.
  inventory-db-push:
    profiles: ["dev"]
    build: ./inventory-service
    command: sh -c "npx prisma db push --skip-generate --accept-data-loss"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${INVENTORY_DB_NAME}?schema=public
    depends_on:
      - db

  auth-db-push:
    profiles: ["dev"]
    build: ./auth-service
    command: sh -c "npx prisma db push --skip-generate"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${AUTH_DB_NAME}?schema=public
    depends_on:
      - db

  # 5. Frontend (Smartbook UI)
  smartbook-ui:
    build: ./smartbook-ui
    container_name: smartbook-ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - VITE_AUTH_BASE_URL=${VITE_AUTH_BASE_URL}
    depends_on:
      - inventory-service
      - auth-service

  # 6. Trí tuệ nhân tạo (Ollama)
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama

  # 7. AI Service (Python/OCR)
  ai-service:
    build: ./ai-service
    container_name: ai-service
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434

volumes:
  postgres_data:
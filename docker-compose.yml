services:
  db:
    image: postgres:15-alpine
    container_name: smartbook_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-inventory}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
      - ./data:/seed-data

  pgadmin:
    image: dpage/pgadmin4
    container_name: smartbook_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy

  inventory-service:
    build: ./services/inventory-service
    container_name: inventory-service
    command: sh -c "npm run start"
    ports:
      - "3003:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@${DB_HOST:-db}:${DB_PORT:-5432}/${INVENTORY_DB_NAME:-inventory_db}?schema=public
      - JWT_SECRET=${JWT_SECRET:-smartbook_shared_jwt_secret}
    depends_on:
      db:
        condition: service_healthy

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    command: sh -c "npm run start"
    ports:
      - "3004:3002"
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@${DB_HOST:-db}:${DB_PORT:-5432}/${AUTH_DB_NAME:-auth_db}?schema=public
      - JWT_SECRET=${JWT_SECRET:-smartbook_shared_jwt_secret}
    depends_on:
      db:
        condition: service_healthy

  borrow-service:
    build: ./services/borrow-service
    container_name: borrow-service
    command: sh -c "npm run start"
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@${DB_HOST:-db}:${DB_PORT:-5432}/${BORROW_DB_NAME:-borrow_db}?schema=public
      - INVENTORY_SERVICE_URL=http://inventory-service:3001
      - JWT_SECRET=${JWT_SECRET:-smartbook_shared_jwt_secret}
      - GATEWAY_URL=http://api-gateway:3000
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-smartbook_internal_key}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-SmartBook Library <noreply@smartbook.vn>}
    depends_on:
      db:
        condition: service_healthy

  inventory-db-push:
    profiles: ["dev"]
    build: ./services/inventory-service
    command: sh -c "npx prisma db push --skip-generate --accept-data-loss"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@${DB_HOST:-db}:${DB_PORT:-5432}/${INVENTORY_DB_NAME:-inventory_db}?schema=public
    depends_on:
      db:
        condition: service_healthy

  auth-db-push:
    profiles: ["dev"]
    build: ./services/auth-service
    command: sh -c "npx prisma db push --skip-generate --accept-data-loss"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@${DB_HOST:-db}:${DB_PORT:-5432}/${AUTH_DB_NAME:-auth_db}?schema=public
    depends_on:
      db:
        condition: service_healthy

  borrow-db-push:
    profiles: ["dev"]
    build: ./services/borrow-service
    command: sh -c "npx prisma db push --skip-generate --accept-data-loss"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@${DB_HOST:-db}:${DB_PORT:-5432}/${BORROW_DB_NAME:-borrow_db}?schema=public
    depends_on:
      db:
        condition: service_healthy

  ai-service:
    build: ./services/ai-service
    container_name: ai-service
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      # Mặc định là llama3 (LLM text) thay vì llava — llava là vision model, không phù hợp cho tóm tắt văn bản
      - SUMMARY_MODEL=${SUMMARY_MODEL:-llama3}
      - GOOGLE_BOOKS_API_BASE_URL=${GOOGLE_BOOKS_API_BASE_URL:-https://www.googleapis.com/books/v1/volumes}
      - OPEN_LIBRARY_API_BASE_URL=${OPEN_LIBRARY_API_BASE_URL:-https://openlibrary.org/api/books}
      - BOOK_LOOKUP_TIMEOUT_SECONDS=${BOOK_LOOKUP_TIMEOUT_SECONDS:-8}
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY:-}
      # WorldCat thường chậm & ít cải thiện, tắt mặc định để lookup nhanh hơn
      - ENABLE_WORLDCAT_LOOKUP=${ENABLE_WORLDCAT_LOOKUP:-false}
      # Groq cloud LLM — free tier, không cần credit. Lấy key tại https://console.groq.com
      # Nếu không set, sẽ fallback về Ollama local
      - GROQ_API_KEY=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${GROQ_API_KEY:-}
      - GROQ_SUMMARY_MODEL=${GROQ_SUMMARY_MODEL:-llama-3.3-70b-versatile}

  api-gateway:
    build: ./apps/api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3002
      - INVENTORY_SERVICE_URL=http://inventory-service:3001
      - BORROW_SERVICE_URL=http://borrow-service:3005
      - AI_SERVICE_URL=http://ai-service:8000
      - JWT_SECRET=${JWT_SECRET:-smartbook_shared_jwt_secret}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-smartbook_internal_key}
    depends_on:
      - auth-service
      - inventory-service
      - borrow-service
      - ai-service

  smartbook-ui:
    build: ./apps/web
    container_name: smartbook-ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:3000
      - VITE_AUTH_BASE_URL=http://localhost:3000
      - VITE_AI_BASE_URL=http://localhost:3000/ai
      - VITE_GATEWAY_BASE_URL=http://localhost:3000
    depends_on:
      - api-gateway
      - inventory-service
      - auth-service
      - borrow-service

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    stdin_open: true
    tty: true

volumes:
  postgres_data:
